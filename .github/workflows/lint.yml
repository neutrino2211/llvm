on:
  push:
    paths:
    - '**.go'
  pull_request:
    paths:
    - '**.go'
  # allow you to run this workflow manually from tab
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: stable
      id: go
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run linters
      run: |
        go install golang.org/x/lint/golint@latest
        go install github.com/mgechev/revive@latest
        echo "### revive"
        $(go env GOPATH)/bin/revive -config .revive.toml ./...
        echo "### golint"
        $(go env GOPATH)/bin/golint ./...
        exit 0
